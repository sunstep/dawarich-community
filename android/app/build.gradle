plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    implementation "androidx.window:window:1.4.0"
    implementation "androidx.window:window-java:1.4.0"
}

// Declare GMS dependency only for the gms flavor.
// afterEvaluate ensures the gmsImplementation configuration already exists.
afterEvaluate {
    dependencies {
        // play-services-location is only compiled into GMS builds.
        // FOSS builds never see these classes, satisfying F-Droid's scanner.
        add("gmsImplementation", 'com.google.android.gms:play-services-location:21.3.0')
    }
}

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()

def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
} else {
    println("[WARN] keystore.properties not found. Falling back to default debug signing for non-release tasks.")
}
android {
    namespace = "com.sunstep.travel"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = "21"
    }

    kotlin {
        jvmToolchain(21)
    }

    defaultConfig {
        applicationId = "com.sunstep.travel"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        if (hasKeystore) {
            debug {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                storeType 'pkcs12'
            }
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                storeType 'pkcs12'
            }
        }
    }

    buildTypes {
        release {

            if (hasKeystore) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }

            // optimizations
            minifyEnabled    true
            shrinkResources  true

            // ProGuard/R8 rules
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                    'proguard-rules.pro'

            debuggable       false
            jniDebuggable    false
        }

        debug {
            // Install debug build alongside release.
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"

            // Use stable debug signing. Helps prevent "lost" secure storage on reinstall.
            if (hasKeystore) {
                signingConfig signingConfigs.debug
            }

            // Distinct launcher name.
            resValue "string", "app_name", "Dawarich (Dev)"
        }
    }

    flavorDimensions += "distribution"

    productFlavors {
        gms {
            dimension "distribution"

            versionNameSuffix "-gms"
        }
        foss {
            dimension "distribution"

            proguardFiles 'proguard-foss-rules.pro'
            applicationIdSuffix ".foss"
            versionNameSuffix "-foss"
        }
    }

    buildFeatures {
        buildConfig true
    }
}

// Exclude Google Play Services from FOSS builds only
// This applies to the app module
configurations.matching { it.name.toLowerCase().contains("foss") }.configureEach {
    exclude group: "com.google.android.gms"
}

// Apply GMS exclusion to ALL subprojects (including Flutter plugins) but ONLY for FOSS configurations
rootProject.subprojects { subproject ->
    subproject.afterEvaluate {
        subproject.configurations.configureEach { config ->
            def configName = config.name.toLowerCase()
            if (configName.startsWith("foss") || configName.contains("foss")) {
                config.exclude group: "com.google.android.gms"
            }
        }
    }
}

flutter {
    source = "../.."
}